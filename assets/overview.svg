<svg xmlns="http://www.w3.org/2000/svg" width="800" height="290" viewBox="0 0 800 290" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="800" height="290" rx="16" fill="#1a1b27" stroke="#2A2E42" stroke-width="1"/>

  <text x="40" y="44" fill="#C0CAF5" font-size="22" font-weight="700" letter-spacing="1">GitHub Stats</text>
  <line x1="30" y1="60" x2="770" y2="60" stroke="#2A2E42" stroke-width="1"/>

  <!-- Left: Overview -->
  <text x="40" y="92" fill="#565F89" font-size="13" font-weight="700" letter-spacing="1">OVERVIEW</text>

  <text x="40" y="138" fill="#7AA2F7" font-size="30" font-weight="700">31</text>
  <text x="40" y="158" fill="#565F89" font-size="12" font-weight="600">PUBLIC REPOS</text>

  <text x="220" y="138" fill="#9ECE6A" font-size="30" font-weight="700">3</text>
  <text x="220" y="158" fill="#565F89" font-size="12" font-weight="600">TOTAL STARS</text>

  <text x="40" y="208" fill="#BB9AF7" font-size="30" font-weight="700">0</text>
  <text x="40" y="228" fill="#565F89" font-size="12" font-weight="600">FOLLOWERS</text>

  <text x="220" y="208" fill="#7DCFFF" font-size="30" font-weight="700">2021</text>
  <text x="220" y="228" fill="#565F89" font-size="12" font-weight="600">MEMBER SINCE</text>

  <!-- Right: Top Languages -->
  <text x="410" y="92" fill="#565F89" font-size="13" font-weight="700" letter-spacing="1">TOP LANGUAGES</text>

  <g font-size="13" font-weight="600" fill="#C0CAF5">
    <text x="410" y="122">Python</text>
    <text x="770" y="122" text-anchor="end" fill="#565F89">13</text>
    <rect x="410" y="128" width="340" height="12" rx="6" fill="#3572A5"/>

    <text x="410" y="162">HTML</text>
    <text x="770" y="162" text-anchor="end" fill="#565F89">3</text>
    <rect x="410" y="168" width="78" height="12" rx="6" fill="#e34c26"/>

    <text x="410" y="202">JavaScript</text>
    <text x="770" y="202" text-anchor="end" fill="#565F89">2</text>
    <rect x="410" y="208" width="52" height="12" rx="6" fill="#f1e05a"/>

    <text x="410" y="242">Jupyter Notebook</text>
    <text x="770" y="242" text-anchor="end" fill="#565F89">1</text>
    <rect x="410" y="248" width="26" height="12" rx="6" fill="#DA5B0B"/>

    <text x="410" y="282">TeX</text>
    <text x="770" y="282" text-anchor="end" fill="#565F89">1</text>
    <rect x="410" y="288" width="26" height="12" rx="6" fill="#4B6C4B"/>
  </g>
